<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Seat Management VIB</title>
<style>
  body { font-family: Arial; margin: 0; }
  #container { position: relative; }
  #map { width: 100%; display: block; }
  .seat {
    position: absolute;
    background: #2ecc71;
    color: #fff;
    padding: 2px 5px;
    font-size: 10px;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h3 style="padding:10px">Quản lý chỗ ngồi</h3>

<div id="container">
  <!-- 🔥 THAY link ảnh của bạn -->
  <img id="map" src="floor.png">
</div>

<script>
const BIN_ID = "YOUR_BIN_ID";
const API_KEY = "YOUR_API_KEY";

let seats = [];

// 🧠 LOAD DATA
async function loadData() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      headers: { "X-Master-Key": API_KEY }
    });
    const json = await res.json();
    seats = json.record.data || [];
    renderSeats();
  } catch(e) {
    console.log("load error");
  }
}

// 🧠 SAVE DATA
async function saveData() {
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify({ data: seats })
  });
}

// 🎯 RENDER
function renderSeats() {
  document.querySelectorAll(".seat").forEach(e => e.remove());

  seats.forEach(s => {
    const el = document.createElement("div");
    el.className = "seat";
    el.style.left = s.x + "px";
    el.style.top = s.y + "px";
    el.innerText = s.id;

    el.onclick = () => editSeat(s);

    document.getElementById("container").appendChild(el);
  });
}

// 🎯 CLICK MAP → ADD
document.getElementById("map").onclick = function(e) {
  const x = e.offsetX;
  const y = e.offsetY;

  const id = prompt("Nhập mã seat (VD: S52)");
  if (!id) return;

  const newSeat = {
    id: id,
    x: x,
    y: y,
    user: "",
    portD: "",
    portT: ""
  };

  seats.push(newSeat);
  saveData();
  renderSeats();
};

// 🎯 EDIT
function editSeat(seat) {
  const user = prompt("User:", seat.user);
  if (user !== null) seat.user = user;

  const portD = prompt("Port D:", seat.portD);
  if (portD !== null) seat.portD = portD;

  const portT = prompt("Port T:", seat.portT);
  if (portT !== null) seat.portT = portT;

  saveData();
  alert("✅ Đã lưu");
}

// INIT
loadData();
</script>

</body>
</html>
