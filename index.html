<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Seat Management VIB</title>

<style>
body { font-family: Arial; margin: 0; }

#toolbar {
  padding: 10px;
  background: #f5f5f5;
}

#container {
  position: relative;
}

#map {
  width: 100%;
}

.seat {
  position: absolute;
  background: #2ecc71;
  color: #fff;
  padding: 2px 6px;
  font-size: 10px;
  border-radius: 4px;
  cursor: pointer;
}

.highlight {
  background: red !important;
}
</style>
</head>

<body>

<div id="toolbar">
  <input id="searchInput" placeholder="Nhập tên hoặc mã seat..." style="padding:5px;width:250px">
  <button onclick="searchSeat()">🔍 Tìm</button>
</div>

<div id="container">
  <!-- 🔥 thay bằng ảnh của bạn -->
  <img id="map" src="floor.png">
</div>

<script>
const BIN_ID = "YOUR_BIN_ID";
const API_KEY = "YOUR_API_KEY";

let seats = [];

// ================= LOAD =================
async function loadData() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      headers: { "X-Master-Key": API_KEY }
    });
    const json = await res.json();
    seats = json.record.data || [];
    renderSeats();
  } catch (e) {
    console.log("Load lỗi");
  }
}

// ================= SAVE =================
async function saveData() {
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify({ data: seats })
  });
}

// ================= RENDER =================
function renderSeats() {
  document.querySelectorAll(".seat").forEach(e => e.remove());

  seats.forEach(s => {
    const el = document.createElement("div");
    el.className = "seat";
    el.style.left = s.x + "px";
    el.style.top = s.y + "px";
    el.innerText = s.id;

    el.onclick = () => editSeat(s);

    document.getElementById("container").appendChild(el);
  });
}

// ================= CLICK MAP =================
document.getElementById("map").onclick = function(e) {
  const x = e.offsetX;
  const y = e.offsetY;

  const id = prompt("Nhập mã seat (VD: S52)");
  if (!id) return;

  const newSeat = {
    id: id,
    x: x,
    y: y,
    user: "",
    portD: "",
    portT: ""
  };

  seats.push(newSeat);
  saveData();
  renderSeats();
};

// ================= EDIT =================
function editSeat(seat) {
  const user = prompt("User:", seat.user);
  if (user !== null) seat.user = user;

  const portD = prompt("Port D:", seat.portD);
  if (portD !== null) seat.portD = portD;

  const portT = prompt("Port T:", seat.portT);
  if (portT !== null) seat.portT = portT;

  saveData();
  alert("✅ Đã lưu");
}

// ================= SEARCH =================
function searchSeat() {
  const keyword = document.getElementById("searchInput").value.toLowerCase();
  let found = false;

  document.querySelectorAll(".seat").forEach(el => {
    const seatId = el.innerText.toLowerCase();
    const seatData = seats.find(s => s.id === el.innerText);
    const user = seatData?.user?.toLowerCase() || "";

    if (seatId.includes(keyword) || user.includes(keyword)) {
      el.classList.add("highlight");
      el.scrollIntoView({ behavior: "smooth", block: "center" });
      found = true;
    } else {
      el.classList.remove("highlight");
    }
  });

  if (!found) alert("❌ Không tìm thấy");
}

// INIT
loadData();
</script>

</body>
</html>
